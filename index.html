<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>APK Creator · Glass Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0b0d15; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:12px; }
        .glass-panel { background:rgba(20,24,40,0.65); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); border:1px solid rgba(255,255,255,0.06); border-radius:2rem; padding:1.5rem 1.2rem 2.2rem; width:100%; max-width:680px; box-shadow:0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04); position:relative; margin-top:20px; }
        .glass-input { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:1.2rem; padding:0.8rem 1rem; color:#e8edff; font-size:0.9rem; outline:none; transition:border 0.2s, background 0.2s; width:100%; }
        .glass-input:focus { border-color:rgba(100,140,255,0.5); background:rgba(255,255,255,0.07); box-shadow:0 0 0 4px rgba(100,140,255,0.08); }
        .glass-input::placeholder { color:rgba(255,255,255,0.25); }
        .glass-btn { background:rgba(100,140,255,0.12); border:1px solid rgba(100,140,255,0.15); border-radius:1.4rem; padding:0.8rem 1.5rem; font-weight:600; font-size:0.9rem; color:#c8daff; cursor:pointer; transition:background 0.2s, border-color 0.2s, transform 0.1s; width:100%; text-align:center; backdrop-filter:blur(4px); }
        .glass-btn:hover:not(:disabled) { background:rgba(100,140,255,0.22); border-color:rgba(100,140,255,0.35); color:#fff; }
        .glass-btn:active:not(:disabled) { transform:scale(0.97); }
        .glass-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
        .glass-btn-success { background:rgba(80,220,160,0.12); border-color:rgba(80,220,160,0.2); color:#a0f0d0; }
        .glass-btn-success:hover:not(:disabled) { background:rgba(80,220,160,0.22); border-color:rgba(80,220,160,0.35); color:#d0fff0; }
        .badge-glass { display:inline-block; padding:0.15rem 0.8rem; border-radius:100px; font-size:0.6rem; font-weight:600; letter-spacing:0.2px; text-transform:uppercase; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); white-space:nowrap; }
        .badge-glass.ok { background:rgba(80,220,160,0.12); border-color:rgba(80,220,160,0.2); color:#80e0c0; }
        .badge-glass.err { background:rgba(255,100,100,0.12); border-color:rgba(255,100,100,0.2); color:#ff9090; }
        .badge-glass.wait { background:rgba(255,200,80,0.12); border-color:rgba(255,200,80,0.2); color:#f0d060; }
        .repo-badge { font-size:0.7rem; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.04); border-radius:100px; padding:0.1rem 0.7rem; color:rgba(255,255,255,0.35); white-space:nowrap; max-width:140px; overflow:hidden; text-overflow:ellipsis; }
        .terminal-glass { margin-top:1.5rem; background:rgba(0,0,0,0.45); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.04); border-radius:1.4rem; overflow:hidden; }
        .terminal-header { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 1rem; background:rgba(0,0,0,0.3); border-bottom:1px solid rgba(255,255,255,0.04); }
        .terminal-header span { font-size:0.6rem; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; color:rgba(255,255,255,0.25); }
        .terminal-actions { display:flex; gap:0.4rem; }
        .terminal-actions button { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:100px; padding:0.15rem 0.6rem; font-size:0.5rem; font-weight:600; color:rgba(255,255,255,0.25); cursor:pointer; transition:background 0.15s, color 0.15s; text-transform:uppercase; letter-spacing:0.3px; }
        .terminal-actions button:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }
        .terminal-body { padding:0.6rem 1rem; height:210px; overflow-y:auto; font-size:0.7rem; line-height:1.6; font-family:'JetBrains Mono','Fira Code',monospace; color:#b0c4e0; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.05) transparent; }
        .terminal-body::-webkit-scrollbar { width:3px; }
        .terminal-body::-webkit-scrollbar-track { background:transparent; }
        .terminal-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:10px; }
        .log-entry { display:flex; gap:0.5rem; align-items:baseline; padding:0.05rem 0; }
        .log-time { color:rgba(255,255,255,0.12); font-size:0.55rem; flex-shrink:0; min-width:3.2rem; }
        .log-msg { word-break:break-word; font-size:0.7rem; }
        .log-msg.info { color:#b0c4e0; }
        .log-msg.success { color:#80e0c0; }
        .log-msg.error { color:#ff9090; }
        .log-msg.warn { color:#f0d060; }
        .log-msg.highlight { color:#b0c0ff; font-weight:500; }
        .dropdown-glass { position:absolute; top:calc(100% + 4px); left:0; width:100%; max-height:160px; overflow-y:auto; background:rgba(16,20,36,0.92); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.06); border-radius:1rem; z-index:20; display:none; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.05) transparent; }
        .dropdown-glass::-webkit-scrollbar { width:3px; }
        .dropdown-glass::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:10px; }
        .dropdown-item { padding:0.4rem 1rem; cursor:pointer; color:rgba(255,255,255,0.6); font-size:0.8rem; transition:background 0.15s, color 0.15s; border-bottom:1px solid rgba(255,255,255,0.02); }
        .dropdown-item:last-child { border-bottom:none; }
        .dropdown-item:hover { background:rgba(255,255,255,0.04); color:#fff; }
        .field-wrap { position:relative; margin-bottom:1rem; }
        .field-wrap label { display:block; font-size:0.6rem; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; color:rgba(255,255,255,0.2); margin-bottom:0.3rem; }
        .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:0.3rem; flex-shrink:0; }
        .status-dot.idle { background:rgba(255,255,255,0.1); }
        .status-dot.running { background:#80b0ff; box-shadow:0 0 12px rgba(80,160,255,0.3); animation:pulse-dot 1.2s infinite; }
        .status-dot.done { background:#80e0c0; }
        .status-dot.fail { background:#ff9090; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.85);} }
        .signature { position:absolute; bottom:0.9rem; right:1.4rem; font-size:0.45rem; font-weight:400; letter-spacing:0.4px; color:rgba(255,255,255,0.06); text-transform:uppercase; user-select:none; pointer-events:none; }
        .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.6rem; flex-wrap:wrap; gap:0.3rem; }
        .header-top h1 { font-size:1.1rem; font-weight:700; color:rgba(255,255,255,0.8); letter-spacing:-0.3px; }
        .header-badges { display:flex; flex-direction:column; align-items:flex-end; gap:0.2rem; flex-shrink:0; }
        .header-badges .badge-row { display:flex; align-items:center; gap:0.4rem; }
        .mode-toggle { display:flex; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:100px; padding:0.2rem; margin-bottom:1rem; gap:0.2rem; }
        .mode-toggle button { flex:1; background:transparent; border:none; border-radius:100px; padding:0.4rem 1rem; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; color:rgba(255,255,255,0.3); cursor:pointer; transition:background 0.2s, color 0.2s; }
        .mode-toggle button.active { background:rgba(255,255,255,0.08); color:#c8daff; }
        .mode-toggle button:hover:not(.active) { color:rgba(255,255,255,0.6); }
        .code-editor { display:none; width:100%; min-height:200px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:1.2rem; padding:0.8rem 1rem; color:#e8edff; font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.8rem; line-height:1.6; resize:vertical; outline:none; transition:border 0.2s; }
        .code-editor:focus { border-color:rgba(100,140,255,0.5); }
        .code-editor::placeholder { color:rgba(255,255,255,0.2); }
        .code-editor.visible { display:block; }
        .sandbox-badge { display:inline-block; font-size:0.6rem; background:rgba(255,200,80,0.12); border:1px solid rgba(255,200,80,0.15); border-radius:100px; padding:0.1rem 0.8rem; color:#f0d060; }
        @media (max-width:480px) {
            body { padding:8px 6px 12px; align-items:flex-start; }
            .glass-panel { padding:1rem 0.8rem 1.8rem; border-radius:1.6rem; margin-top:10px; }
            .header-top h1 { font-size:0.95rem; }
            .repo-badge { font-size:0.55rem; max-width:100px; padding:0.05rem 0.5rem; }
            .badge-glass { font-size:0.5rem; padding:0.1rem 0.6rem; }
            .status-dot { width:6px; height:6px; }
            .glass-input { font-size:0.8rem; padding:0.6rem 0.8rem; border-radius:1rem; }
            .field-wrap { margin-bottom:0.7rem; }
            .field-wrap label { font-size:0.5rem; }
            .glass-btn { font-size:0.8rem; padding:0.6rem 1rem; border-radius:1.2rem; }
            .terminal-glass { margin-top:1rem; border-radius:1.2rem; }
            .terminal-header { padding:0.3rem 0.7rem; }
            .terminal-header span { font-size:0.5rem; }
            .terminal-actions button { font-size:0.4rem; padding:0.1rem 0.4rem; }
            .terminal-body { height:150px; padding:0.4rem 0.7rem; font-size:0.6rem; line-height:1.5; }
            .log-time { font-size:0.45rem; min-width:2.6rem; }
            .log-msg { font-size:0.6rem; }
            .signature { font-size:0.4rem; bottom:0.6rem; right:1rem; }
            .dropdown-item { font-size:0.7rem; padding:0.3rem 0.8rem; }
            .code-editor { min-height:140px; font-size:0.7rem; padding:0.5rem 0.7rem; }
            .mode-toggle button { font-size:0.6rem; padding:0.3rem 0.8rem; }
        }
        @media (max-width:380px) {
            .header-top h1 { font-size:0.85rem; }
            .repo-badge { max-width:80px; font-size:0.5rem; }
            .badge-glass { font-size:0.45rem; padding:0.05rem 0.4rem; }
            .glass-btn { font-size:0.7rem; padding:0.5rem 0.8rem; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header-top">
        <h1>APK Creator</h1>
        <div class="header-badges">
            <div class="badge-row">
                <span class="repo-badge" id="repoBadge">📂 Aucun</span>
            </div>
            <div class="badge-row">
                <span class="status-dot idle" id="statusDot"></span>
                <span class="badge-glass wait" id="statusBadge">⏳ En attente</span>
            </div>
        </div>
    </div>

    <div class="mode-toggle" id="modeToggle">
        <button class="active" data-mode="repo" onclick="setMode('repo')">📦 Projet</button>
        <button data-mode="direct" onclick="setMode('direct')">✏️ Code direct</button>
    </div>

    <div class="field-wrap">
        <label>🔑 Clé API GitHub (PAT)</label>
        <input type="password" id="ghToken" class="glass-input" placeholder="ghp_..." autocomplete="off" />
    </div>

    <div class="field-wrap" id="repoField">
        <label>📂 Projet cible</label>
        <input type="text" id="repoInput" class="glass-input" placeholder="Entrez un token pour charger les projets..." disabled autocomplete="off" />
        <div id="repoDropdown" class="dropdown-glass"></div>
    </div>

    <div class="field-wrap" id="directField" style="display:none;">
        <label>📄 Code HTML <span class="sandbox-badge">📦 testapk</span></label>
        <textarea id="codeInput" class="code-editor" placeholder="Collez ici votre code HTML monolithique..." spellcheck="false"></textarea>
    </div>

    <div class="flex flex-col gap-2 mt-1">
        <button id="buildBtn" class="glass-btn" onclick="triggerBuild()" disabled>
            🚀 Lancer la compilation
        </button>
        <button id="downloadBtn" class="glass-btn glass-btn-success" onclick="downloadAPK()" style="display:none;">
            ⬇️ Télécharger APK
        </button>
    </div>

    <div class="terminal-glass">
        <div class="terminal-header">
            <span>›_ logs</span>
            <div class="terminal-actions">
                <button onclick="copyLogs()">📋</button>
                <button onclick="clearLogs()">✕</button>
            </div>
        </div>
        <div class="terminal-body" id="terminalOutput">
            <div class="log-entry">
                <span class="log-time">--:--:--</span>
                <span class="log-msg info">💡 Entrez votre token PAT</span>
            </div>
        </div>
    </div>

    <div class="signature">LAICHE BRAHIM PARIS 2026</div>
</div>

<script>
    // ================================================================
    //  CONFIGURATION
    // ================================================================
    const BRIDGE_URL = 'https://raw.githubusercontent.com/mekeirish/APK-Creator/main/bridge.js';
    const SANDBOX_OWNER = 'mekeirish';
    const SANDBOX_REPO = 'testapk';

    let reposMap = new Map();
    let currentOwner = '';
    let currentRepo = '';
    let currentBranch = 'main';
    let pollingInterval = null;
    let directDownloadUrl = '#';
    let buildInProgress = false;
    let currentMode = 'repo';
    let currentWorkflowFile = ''; // Stocke le nom du fichier utilisé

    // ================================================================
    //  DOM REFS
    // ================================================================
    const ghTokenInput = document.getElementById('ghToken');
    const repoInput = document.getElementById('repoInput');
    const repoDropdown = document.getElementById('repoDropdown');
    const buildBtn = document.getElementById('buildBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const terminalOutput = document.getElementById('terminalOutput');
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const repoBadge = document.getElementById('repoBadge');
    const codeInput = document.getElementById('codeInput');
    const repoField = document.getElementById('repoField');
    const directField = document.getElementById('directField');

    // ================================================================
    //  MODE TOGGLE
    // ================================================================
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-toggle button').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        if (mode === 'repo') {
            repoField.style.display = 'block';
            directField.style.display = 'none';
            codeInput.style.display = 'none';
            if (reposMap.size > 0) {
                repoInput.disabled = false;
                repoInput.placeholder = 'Tapez le nom du projet...';
            } else {
                repoInput.disabled = true;
                repoInput.placeholder = 'Entrez un token pour charger les projets...';
            }
            currentRepo = '';
            setRepoBadgeText('');
            buildBtn.disabled = true;
        } else {
            repoField.style.display = 'none';
            directField.style.display = 'block';
            codeInput.style.display = 'block';
            currentOwner = SANDBOX_OWNER;
            currentRepo = SANDBOX_REPO;
            currentBranch = 'main';
            setRepoBadgeText('🧪 testapk (sandbox)');
            var token = ghTokenInput.value.trim();
            buildBtn.disabled = !(token.length > 20);
        }
    }

    // ================================================================
    //  YAML
    // ================================================================
    function getYamlContent(repoName) {
        const repoLower = repoName.toLowerCase();
        return `name: Build APK Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Construction de l'environnement PWA → APK
        run: |
          mkdir -p capacitor-app/www
          rsync -av --exclude='capacitor-app' --exclude='.git' --exclude='.github' ./ capacitor-app/www/
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.brahim.${repoLower}",
          "appName": "${repoName}",
          "webDir": "www",
          "bundledWebRuntime": true
        }
        EOF
          npx cap init "${repoName}" "com.brahim.${repoLower}" --web-dir www
          npx cap add android

      - name: 🔌 Téléchargement et injection chirurgicale du Bridge
        run: |
          cd capacitor-app/www
          MAIN_HTML=$(find . -maxdepth 1 -name "*.html" | head -n 1)
          if [ -z "$MAIN_HTML" ]; then
            echo "⚠️ Aucun fichier HTML trouvé"
          else
            curl -s -o bridge.js "${BRIDGE_URL}" || echo "⚠️ Téléchargement échoué"
            if [ -f "../node_modules/@capacitor/core/dist/capacitor.js" ]; then
              cp ../node_modules/@capacitor/core/dist/capacitor.js capacitor.js
            else
              touch capacitor.js
            fi
            node -e "
              const fs = require('fs');
              const htmlFile = '\${MAIN_HTML}';
              let content = fs.readFileSync(htmlFile, 'utf8');
              let parts = content.split(/<\\/body>/i);
              if (parts.length > 1) {
                let lastPart = parts.pop();
                let scripts = '<script src=\"capacitor.js\"><\\/script>\\n<script src=\"bridge.js\"><\\/script>\\n</body>';
                let newContent = parts.join('</body>') + scripts + lastPart;
                fs.writeFileSync(htmlFile, newContent, 'utf8');
                console.log('✅ Bridge injecté chirurgicalement');
              } else {
                console.log('⚠️ Aucun </body> trouvé, injection à la fin');
                fs.appendFileSync(htmlFile, '<script src=\"capacitor.js\"><\\/script>\\n<script src=\"bridge.js\"><\\/script>\\n');
              }
            "
          fi

      - name: 🔄 Synchronisation des assets vers Android
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Génération automatique de l'icône
        run: |
          cd capacitor-app
          npm install -D @capacitor/assets
          mkdir -p assets
          if [ -f "../icon.png" ]; then
            cp ../icon.png assets/icon.png
            npx @capacitor/assets generate --android
          else
            echo "⚠️ icon.png introuvable"
          fi

      - name: Résolution des conflits Kotlin
        run: |
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> capacitor-app/android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renommer l'APK
        run: |
          cd capacitor-app/android/app/build/outputs/apk/debug/
          mv app-debug.apk ${repoName}-debug.apk

      - name: Publication de l'APK en Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "capacitor-app/android/app/build/outputs/apk/debug/${repoName}-debug.apk"
          tag: "latest"
          name: "${repoName} Latest Build"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          prerelease: true
          token: \${{ secrets.GITHUB_TOKEN }}`;
    }

    // ================================================================
    //  LOGS
    // ================================================================
    function logMsg(msg, type) {
        type = type || 'info';
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        var s = String(now.getSeconds()).padStart(2, '0');
        var time = h + ':' + m + ':' + s;
        var div = document.createElement('div');
        div.className = 'log-entry';
        var ts = document.createElement('span');
        ts.className = 'log-time';
        ts.textContent = time;
        var ms = document.createElement('span');
        ms.className = 'log-msg ' + type;
        ms.textContent = msg;
        div.appendChild(ts);
        div.appendChild(ms);
        terminalOutput.appendChild(div);
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    function copyLogs() {
        var text = terminalOutput.innerText;
        navigator.clipboard.writeText(text).then(function() {
            logMsg('📋 Logs copiés', 'success');
        }).catch(function() { alert('Copie manuelle'); });
    }

    function clearLogs() {
        terminalOutput.innerHTML = '';
        logMsg('🧹 Nettoyé', 'warn');
    }

    function setStatus(label, type) {
        type = type || 'wait';
        statusBadge.textContent = label;
        statusBadge.className = 'badge-glass';
        if (type === 'ok') statusBadge.classList.add('ok');
        else if (type === 'err') statusBadge.classList.add('err');
        else statusBadge.classList.add('wait');

        statusDot.className = 'status-dot';
        if (type === 'ok') statusDot.classList.add('done');
        else if (type === 'err') statusDot.classList.add('fail');
        else if (type === 'running') statusDot.classList.add('running');
        else statusDot.classList.add('idle');
    }

    function setRepoBadgeText(name) {
        repoBadge.textContent = name ? '📂 ' + name : '📂 Aucun';
    }

    // ================================================================
    //  INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
        logMsg('🚀 APK Creator prêt', 'info');
        var saved = localStorage.getItem('builder_gh_token');
        if (saved) {
            ghTokenInput.value = saved;
            verifyTokenAndLoadRepos(saved);
        }
        setMode('repo');
    });

    ghTokenInput.addEventListener('input', function(e) {
        var token = e.target.value.trim();
        if (token.length > 20) {
            verifyTokenAndLoadRepos(token);
        } else {
            repoInput.disabled = true;
            repoInput.placeholder = 'Entrez un token valide...';
            buildBtn.disabled = true;
            reposMap.clear();
            repoDropdown.style.display = 'none';
            setStatus('⏳ En attente', 'wait');
            setRepoBadgeText('');
            if (currentMode === 'direct') {
                buildBtn.disabled = true;
            }
        }
    });

    // ================================================================
    //  CHARGEMENT DES REPOS
    // ================================================================
    async function verifyTokenAndLoadRepos(token) {
        logMsg('🔍 Vérification token...', 'info');
        setStatus('⏳ Chargement...', 'wait');

        try {
            var res = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!res.ok) {
                if (res.status === 401) throw new Error('Token invalide ou expiré');
                if (res.status === 403) throw new Error('Rate limit atteint');
                throw new Error('Erreur ' + res.status + ': ' + res.statusText);
            }

            var data = await res.json();
            reposMap.clear();
            data.forEach(function(repo) {
                reposMap.set(repo.name.toLowerCase(), repo);
            });

            localStorage.setItem('builder_gh_token', token);
            logMsg('✅ ' + reposMap.size + ' projets', 'success');
            setStatus('✅ ' + reposMap.size + ' repos', 'ok');

            if (currentMode === 'repo') {
                repoInput.disabled = false;
                repoInput.placeholder = 'Tapez le nom du projet...';
                repoInput.value = '';
                repoDropdown.style.display = 'none';
                buildBtn.disabled = true;
                setRepoBadgeText('');
            } else {
                buildBtn.disabled = false;
            }

        } catch (err) {
            logMsg('❌ ' + err.message, 'error');
            setStatus('❌ Échec', 'err');
            repoInput.disabled = true;
            repoInput.placeholder = 'Token invalide';
            buildBtn.disabled = true;
            if (currentMode === 'direct') {
                buildBtn.disabled = true;
            }
        }
    }

    // ================================================================
    //  DROPDOWN
    // ================================================================
    repoInput.addEventListener('focus', function() {
        if (reposMap.size > 0 && currentMode === 'repo') showDropdown(repoInput.value);
    });

    repoInput.addEventListener('input', function(e) {
        if (currentMode === 'repo') {
            showDropdown(e.target.value);
            checkSelection();
        }
    });

    document.addEventListener('click', function(e) {
        if (e.target !== repoInput && e.target !== repoDropdown) {
            repoDropdown.style.display = 'none';
        }
    });

    function showDropdown(filter) {
        var f = filter.toLowerCase().trim();
        repoDropdown.innerHTML = '';
        var count = 0;

        reposMap.forEach(function(repo, nameLower) {
            if (nameLower.indexOf(f) !== -1 && count < 12) {
                var item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = repo.name;
                item.onclick = function() {
                    repoInput.value = repo.name;
                    repoDropdown.style.display = 'none';
                    checkSelection();
                };
                repoDropdown.appendChild(item);
                count++;
            }
        });

        repoDropdown.style.display = count > 0 ? 'block' : 'none';
    }

    function checkSelection() {
        if (currentMode !== 'repo') return;
        var val = repoInput.value.trim().toLowerCase();
        if (reposMap.has(val)) {
            var repo = reposMap.get(val);
            currentOwner = repo.owner.login;
            currentRepo = repo.name;
            currentBranch = repo.default_branch;
            buildBtn.disabled = false;
            setRepoBadgeText(repo.name);
            logMsg('🎯 ' + repo.name + ' (' + currentBranch + ')', 'highlight');
        } else {
            buildBtn.disabled = true;
            setRepoBadgeText('');
        }
    }

    // ================================================================
    //  MISE À JOUR DU SANDBOX
    // ================================================================
    async function pushCodeToSandbox(token, code) {
        logMsg('📤 Envoi du code vers le sandbox...', 'info');
        try {
            var sha = null;
            var getRes = await fetch('https://api.github.com/repos/' + SANDBOX_OWNER + '/' + SANDBOX_REPO + '/contents/index.html', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (getRes.ok) {
                var data = await getRes.json();
                sha = data.sha;
                logMsg('🔁 Fichier existant (SHA: ' + sha.slice(0,7) + ')', 'warn');
            } else if (getRes.status !== 404) {
                var err = await getRes.json();
                throw new Error(err.message || 'Erreur ' + getRes.status);
            } else {
                logMsg('📝 Nouveau fichier', 'warn');
            }

            var encoded = btoa(unescape(encodeURIComponent(code)));
            var body = {
                message: 'feat: mise à jour depuis APK Creator (code direct)',
                content: encoded,
                branch: currentBranch
            };
            if (sha) body.sha = sha;

            var putRes = await fetch('https://api.github.com/repos/' + SANDBOX_OWNER + '/' + SANDBOX_REPO + '/contents/index.html', {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!putRes.ok) {
                var errData = await putRes.json();
                throw new Error(errData.message || 'Erreur ' + putRes.status);
            }

            var result = await putRes.json();
            logMsg('✅ index.html mis à jour (SHA: ' + result.content.sha.slice(0,7) + ')', 'success');
            return true;
        } catch (err) {
            logMsg('❌ Échec de l\'envoi du code : ' + err.message, 'error');
            throw err;
        }
    }

    // ================================================================
    //  ENCODAGE BASE64 ROBUSTE
    // ================================================================
    function utf8_to_b64(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode(parseInt(p1, 16));
        }));
    }

    function b64_to_utf8(str) {
        try {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch(e) {
            return atob(str);
        }
    }

    // ================================================================
    //  CRÉATION DU WORKFLOW AVEC NOM UNIQUE
    // ================================================================
    async function ensureWorkflowExists(token, targetOwner, targetRepo) {
        // Générer un nom de fichier unique avec timestamp
        var timestamp = Date.now();
        var uniqueFilename = 'build-' + timestamp + '.yml';
        var workflowPath = '.github/workflows/' + uniqueFilename;

        logMsg('📄 Création workflow : ' + uniqueFilename, 'info');

        // 1. Vérifier si un workflow existe déjà et le supprimer (pour éviter les doublons)
        try {
            var listRes = await fetch('https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/actions/workflows', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (listRes.ok) {
                var listData = await listRes.json();
                for (var i = 0; i < listData.workflows.length; i++) {
                    var wf = listData.workflows[i];
                    if (wf.path && wf.path.includes('build-') && wf.path.endsWith('.yml')) {
                        if (wf.path !== workflowPath) {
                            logMsg('🗑️ Suppression ancien workflow : ' + wf.path, 'warn');
                            // Supprimer le fichier
                            var getRes = await fetch('https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/contents/' + wf.path, {
                                headers: { 'Authorization': 'Bearer ' + token }
                            });
                            if (getRes.ok) {
                                var data = await getRes.json();
                                if (data.sha) {
                                    await fetch('https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/contents/' + wf.path, {
                                        method: 'DELETE',
                                        headers: {
                                            'Authorization': 'Bearer ' + token,
                                            'Content-Type': 'application/json'
                                        },
                                        body: JSON.stringify({
                                            message: 'Suppression ancien workflow',
                                            sha: data.sha,
                                            branch: currentBranch
                                        })
                                    });
                                    logMsg('✅ Ancien workflow supprimé', 'success');
                                }
                            }
                        }
                    }
                }
            }
        } catch(e) {
            logMsg('⚠️ Erreur lors du nettoyage : ' + e.message, 'warn');
        }

        // 2. Générer le YAML et l'écrire
        var yamlContent = getYamlContent(targetRepo);
        if (!/on:\s*workflow_dispatch/.test(yamlContent)) {
            throw new Error('YAML invalide');
        }

        var encoded = btoa(yamlContent);
        var body = {
            message: 'feat: workflow APK Creator (build ' + timestamp + ')',
            content: encoded,
            branch: currentBranch
        };

        var putRes = await fetch('https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/contents/' + workflowPath, {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        if (!putRes.ok) {
            var errData = await putRes.json();
            throw new Error(errData.message || 'Erreur écriture');
        }

        var result = await putRes.json();
        logMsg('✅ Workflow créé : ' + uniqueFilename + ' (SHA: ' + result.content.sha.slice(0,7) + ')', 'success');

        // 3. Attendre l'indexation
        logMsg('⏳ Attente indexation...', 'warn');
        var maxWait = 30; // 30 secondes max
        var found = false;
        for (var w = 0; w < maxWait; w++) {
            await new Promise(function(r) { setTimeout(r, 1000); });
            try {
                var checkRes = await fetch('https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/actions/workflows', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (checkRes.ok) {
                    var checkData = await checkRes.json();
                    var exists = checkData.workflows.some(function(wf) {
                        return wf.path === workflowPath && wf.state === 'active';
                    });
                    if (exists) {
                        logMsg('✅ Workflow indexé (' + (w+1) + 's)', 'success');
                        found = true;
                        break;
                    }
                }
            } catch(e) {}
            if ((w+1) % 5 === 0) {
                logMsg('⏳ En attente... (' + (w+1) + 's)', 'warn');
            }
        }

        if (!found) {
            logMsg('⚠️ Indexation non confirmée, on tente quand même...', 'warn');
        }

        // 4. Mettre à jour le nom du fichier pour le dispatch
        currentWorkflowFile = workflowPath;
        return workflowPath;
    }

    // ================================================================
    //  DÉCLENCHEMENT DU BUILD
    // ================================================================
    async function triggerBuild() {
        if (buildInProgress) return;

        var token = ghTokenInput.value.trim();
        if (!token || token.length < 20) {
            logMsg('❌ Token invalide', 'error');
            return;
        }

        buildInProgress = true;
        buildBtn.disabled = true;
        downloadBtn.style.display = 'none';
        directDownloadUrl = '#';

        logMsg('═══════════════════', 'highlight');

        try {
            var targetOwner, targetRepo;

            if (currentMode === 'direct') {
                var code = codeInput.value.trim();
                if (!code) {
                    logMsg('❌ Aucun code HTML à compiler', 'error');
                    buildBtn.disabled = false;
                    buildInProgress = false;
                    return;
                }
                await pushCodeToSandbox(token, code);
                targetOwner = SANDBOX_OWNER;
                targetRepo = SANDBOX_REPO;
                logMsg('🚀 Build sandbox : ' + targetRepo, 'highlight');
            } else {
                if (!currentRepo) {
                    logMsg('❌ Aucun projet sélectionné', 'error');
                    buildBtn.disabled = false;
                    buildInProgress = false;
                    return;
                }
                targetOwner = currentOwner;
                targetRepo = currentRepo;
                logMsg('🚀 Build : ' + targetRepo, 'highlight');
            }

            setStatus('⚙️ Démarrage...', 'running');

            // Création du workflow avec nom unique
            var workflowPath = await ensureWorkflowExists(token, targetOwner, targetRepo);
            var workflowName = workflowPath.split('/').pop();

            // Envoyer le dispatch avec le bon nom de fichier
            logMsg('📡 Envoi commande...', 'info');
            var dispatchRes = null;
            for (var attempt = 0; attempt < 5; attempt++) {
                dispatchRes = await fetch(
                    'https://api.github.com/repos/' + targetOwner + '/' + targetRepo + '/actions/workflows/' + workflowName + '/dispatches',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ ref: currentBranch })
                    }
                );

                if (dispatchRes.status === 204) {
                    break;
                }

                if (attempt < 4) {
                    logMsg('⏳ Retentative (' + (attempt + 1) + '/5)...', 'warn');
                    await new Promise(function(r) { setTimeout(r, 3000); });
                }
            }

            if (dispatchRes.status === 204) {
                logMsg('✅ Commande envoyée !', 'success');
                setStatus('⏳ Compilation...', 'running');
                logMsg('🔍 Recherche run...', 'info');
                var pollOwner = targetOwner;
                var pollRepo = targetRepo;
                setTimeout(function() { startPolling(token, pollOwner, pollRepo); }, 3000);
            } else {
                var err = await dispatchRes.json().catch(function() { return {}; });
                throw new Error(err.message || 'Erreur ' + dispatchRes.status);
            }

        } catch (err) {
            logMsg('❌ ' + err.message, 'error');
            setStatus('❌ Échec', 'err');
            buildBtn.disabled = false;
            buildInProgress = false;
        }
    }

    // ================================================================
    //  POLLING
    // ================================================================
    function startPolling(token, pollOwner, pollRepo) {
        if (pollingInterval) clearInterval(pollingInterval);
        var attempts = 0;
        var maxAttempts = 90;

        pollingInterval = setInterval(async function() {
            attempts++;
            if (attempts > maxAttempts) {
                clearInterval(pollingInterval);
                logMsg('⏱️ Délai dépassé', 'warn');
                setStatus('⏱️ Timeout', 'err');
                buildBtn.disabled = false;
                buildInProgress = false;
                return;
            }

            try {
                var res = await fetch(
                    'https://api.github.com/repos/' + pollOwner + '/' + pollRepo + '/actions/runs?event=workflow_dispatch&per_page=1',
                    { headers: { 'Authorization': 'Bearer ' + token } }
                );
                if (!res.ok) return;

                var data = await res.json();
                if (!data.workflow_runs || data.workflow_runs.length === 0) {
                    logMsg('⏳ File d\'attente...', 'warn');
                    return;
                }

                var run = data.workflow_runs[0];
                var status = run.status;
                var conclusion = run.conclusion;

                if (status === 'queued') {
                    logMsg('⏳ File d\'attente...', 'warn');
                } else if (status === 'in_progress') {
                    logMsg('🔧 Compilation...', 'info');
                    setStatus('⚙️ Build en cours', 'running');
                } else if (status === 'completed') {
                    clearInterval(pollingInterval);
                    buildBtn.disabled = false;
                    buildInProgress = false;

                    if (conclusion === 'success') {
                        logMsg('✅🎉 Succès !', 'success');
                        setStatus('✅ Succès', 'ok');

                        var url = 'https://github.com/' + pollOwner + '/' + pollRepo + '/releases/download/latest/' + pollRepo + '-debug.apk';
                        directDownloadUrl = url;
                        downloadBtn.style.display = 'block';
                        logMsg('🔗 APK prêt', 'success');
                    } else {
                        logMsg('❌ Échec (' + conclusion + ')', 'error');
                        setStatus('❌ Échec', 'err');
                        logMsg('📄 ' + run.html_url, 'error');
                    }
                }
            } catch (e) {}
        }, 8000);
    }

    // ================================================================
    //  TÉLÉCHARGEMENT
    // ================================================================
    function downloadAPK() {
        if (directDownloadUrl && directDownloadUrl !== '#') {
            window.open(directDownloadUrl, '_blank');
            logMsg('📲 Téléchargement lancé', 'success');
        } else {
            logMsg('❌ Aucun APK disponible', 'error');
        }
    }

    // ================================================================
    //  RÉINITIALISATION
    // ================================================================
    window.resetBuilder = function() {
        if (pollingInterval) clearInterval(pollingInterval);
        buildInProgress = false;
        buildBtn.disabled = true;
        downloadBtn.style.display = 'none';
        directDownloadUrl = '#';
        setStatus('⏳ En attente', 'wait');
        logMsg('🔄 Réinitialisé', 'warn');
    };

    // Raccourcis clavier
    repoInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !buildBtn.disabled && currentMode === 'repo') triggerBuild();
    });
    ghTokenInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') verifyTokenAndLoadRepos(ghTokenInput.value.trim());
    });
    codeInput.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            if (!buildBtn.disabled) triggerBuild();
        }
    });

    logMsg('📌 Token sauvegardé', 'info');
    logMsg('🪟 Glass · Dark', 'info');
    logMsg('💡 Mode Code Direct : Ctrl+Enter pour lancer', 'info');
</script>
